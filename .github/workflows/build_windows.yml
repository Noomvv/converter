name: Build Windows Portable EXE

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # убирает предупреждение о Node.js 20

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build portable EXE
        run: pyinstaller converter.spec

      - name: Check build output
        run: |
          echo "=== Files in dist/ ==="
          dir dist
          echo "=== EXE size ==="
          (Get-Item dist\ImageConverter.exe).length / 1MB

      - name: Create README for friend
        run: |
          echo "Image Converter — portable app" > dist\README.txt
          echo "" >> dist\README.txt
          echo "HOW TO RUN:" >> dist\README.txt
          echo "1. Double-click ImageConverter.exe" >> dist\README.txt
          echo "2. If Windows shows a blue warning (SmartScreen):" >> dist\README.txt
          echo "   - Click 'More info'" >> dist\README.txt
          echo "   - Click 'Run anyway'" >> dist\README.txt
          echo "" >> dist\README.txt
          echo "No installation needed. No Python needed." >> dist\README.txt

      - name: Upload EXE + README as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ImageConverter-Windows
          path: |
            dist/ImageConverter.exe
            dist/README.txt
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/ImageConverter.exe
            dist/README.txt
          generate_release_notes: true

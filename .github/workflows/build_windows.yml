name: Build Windows Portable EXE

on:
  # Запускается вручную из вкладки Actions на GitHub
  workflow_dispatch:

  # Автоматически при создании тега v* (например git tag v1.0 && git push --tags)
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build portable EXE
        run: pyinstaller converter.spec

      - name: Upload EXE as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ImageConverter-Windows
          path: dist/ImageConverter.exe
          retention-days: 30

      # Создаёт GitHub Release с EXE при push тега v*
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ImageConverter.exe
          generate_release_notes: true
